<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <meta name="theme-color" content="#1f2e00"/>
    <meta name="color-scheme" content="light"/>
    <title>{% block title %}VehicleRent Pro{% endblock %}</title>
    <meta name="description" content="{% block meta_description %}{{ BUSINESS_NAME }} - Premium vehicle rental service. Browse our fleet of cars, SUVs, bikes and more. Flexible daily, weekly & monthly rentals.{% endblock %}"/>
    <meta name="robots" content="index, follow"/>
    <link rel="canonical" href="{{ request.build_absolute_uri }}"/>

    <!-- Open Graph -->
    <meta property="og:title" content="{% block og_title %}{{ BUSINESS_NAME }}{% endblock %}"/>
    <meta property="og:description" content="{% block og_description %}Premium vehicle rental service with a wide fleet of cars, SUVs, bikes and more.{% endblock %}"/>
    <meta property="og:type" content="website"/>
    <meta property="og:url" content="{{ request.build_absolute_uri }}"/>
    <meta property="og:site_name" content="{{ BUSINESS_NAME }}"/>

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>

    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        // Editorial Luxury Concierge — design tokens (refresh 2026)
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        // Surface tiers (warm cream)
                        "surface": "#fbfaf1",
                        "surface-dim": "#dbdad2",
                        "surface-bright": "#fbfaf1",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-low": "#f5f4eb",
                        "surface-container": "#efeee6",
                        "surface-container-high": "#e9e8e0",
                        "surface-container-highest": "#e4e3da",
                        "surface-variant": "#e4e3da",
                        "surface-tint": "#51652a",
                        "background": "#fbfaf1",
                        // Foreground / text
                        "on-surface": "#1b1c17",
                        "on-surface-variant": "#45483c",
                        "on-background": "#1b1c17",
                        "inverse-surface": "#30312b",
                        "inverse-on-surface": "#f2f1e8",
                        // Outlines
                        "outline": "#75786b",
                        "outline-variant": "#c5c8b8",
                        // Olive primary scale
                        "primary": "#1f2e00",
                        "primary-container": "#33450d",
                        "on-primary": "#ffffff",
                        "on-primary-container": "#9cb36f",
                        "primary-fixed": "#d4eca2",
                        "primary-fixed-dim": "#b8cf88",
                        "on-primary-fixed": "#141f00",
                        "on-primary-fixed-variant": "#3a4d14",
                        "inverse-primary": "#b8cf88",
                        // Olive secondary
                        "secondary": "#52652a",
                        "secondary-container": "#d4eca2",
                        "on-secondary": "#ffffff",
                        "on-secondary-container": "#576b2f",
                        "secondary-fixed": "#d4eca2",
                        "secondary-fixed-dim": "#b8cf88",
                        "on-secondary-fixed": "#141f00",
                        "on-secondary-fixed-variant": "#3b4d14",
                        // Tertiary (plum, only used sparingly)
                        "tertiary": "#421941",
                        "tertiary-container": "#5b2f58",
                        "on-tertiary": "#ffffff",
                        "on-tertiary-container": "#d199c9",
                        "tertiary-fixed": "#ffd7f6",
                        "tertiary-fixed-dim": "#efb4e6",
                        "on-tertiary-fixed": "#320a32",
                        "on-tertiary-fixed-variant": "#643760",
                        // Errors
                        "error": "#ba1a1a",
                        "on-error": "#ffffff",
                        "error-container": "#ffdad6",
                        "on-error-container": "#93000a"
                    },
                    borderRadius: {
                        DEFAULT: "0.25rem",
                        lg: "0.5rem",
                        xl: "0.75rem",
                        "2xl": "1rem",
                        "3xl": "1.5rem",
                        full: "9999px"
                    },
                    fontFamily: {
                        headline: ["Noto Serif", "serif"],
                        serif: ["Noto Serif", "serif"],
                        body: ["Manrope", "sans-serif"],
                        label: ["Manrope", "sans-serif"]
                    },
                    fontSize: {
                        "display-hero": ["96px", {lineHeight: "0.95", letterSpacing: "-0.04em", fontWeight: "700"}],
                        "headline-lg": ["48px", {lineHeight: "1.1", letterSpacing: "-0.02em", fontWeight: "700"}],
                        "headline-md": ["32px", {lineHeight: "1.2", letterSpacing: "-0.02em", fontWeight: "700"}],
                        "body-lg": ["18px", {lineHeight: "1.6", fontWeight: "300"}],
                        "body-md": ["16px", {lineHeight: "1.5", fontWeight: "400"}],
                        "label-tiny": ["11px", {lineHeight: "1", letterSpacing: "0.2em", fontWeight: "700"}]
                    }
                },
            },
        }
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        html { overflow-x: hidden; }
        body { font-family: 'Manrope', sans-serif; background-color: #fbfaf1; color: #1b1c17; overflow-x: hidden; }
        .font-serif { font-family: 'Noto Serif', serif; }
        .font-headline { font-family: 'Noto Serif', serif; letter-spacing: -0.02em; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
        .glass-nav { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .glass-panel { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .vehicle-card:hover { transform: translateY(-8px); transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .vehicle-card { transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .ghost-border { border: 1px solid rgba(117, 120, 107, 0.15); }
        .ghost-divider { border-color: rgba(69, 72, 60, 0.15); }
        .label-tiny { font-size: 11px; font-weight: 700; letter-spacing: 0.2em; line-height: 1; text-transform: uppercase; }
        .display-hero { font-family: 'Noto Serif', serif; font-weight: 700; line-height: 0.95; letter-spacing: -0.04em; }
        .headline-lg { font-family: 'Noto Serif', serif; font-weight: 700; line-height: 1.1; letter-spacing: -0.02em; }
        .headline-md { font-family: 'Noto Serif', serif; font-weight: 700; line-height: 1.2; letter-spacing: -0.02em; }

        /* Accessibility */
        [x-cloak] { display: none !important; }
        .skip-link { position: absolute; top: -100%; left: 50%; transform: translateX(-50%); z-index: 9999; }
        .skip-link:focus { top: 0.5rem; }
        *:focus-visible { outline: 2px solid #1f2e00; outline-offset: 2px; border-radius: 4px; }
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; scroll-behavior: auto !important; }
            .vehicle-card:hover { transform: none; }
        }

        /* Print */
        @media print { nav, aside, .no-print, .whatsapp-float, #back-to-top, #cookie-banner { display: none !important; } main { padding-top: 0 !important; } }

        /* Ken Burns animation for hero background */
        @keyframes kenburns {
            0% { transform: scale(1); }
            100% { transform: scale(1.08); }
        }
        .kenburns { animation: kenburns 18s ease-in-out infinite alternate; }
        .kenburns-reverse { animation: kenburns 18s ease-in-out infinite alternate-reverse; }

        /* Smooth image loading */
        img { content-visibility: auto; }
        img[loading="lazy"] { transition: opacity 0.3s; }
    </style>
    {% block extra_css %}{% endblock %}

    <!-- Structured Data -->
    {% block structured_data %}
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "AutoRental",
        "name": "{{ BUSINESS_NAME }}",
        "telephone": "{{ BUSINESS_PHONE }}",
        "email": "{{ BUSINESS_EMAIL }}",
        "address": {
            "@type": "PostalAddress",
            "streetAddress": "{{ BUSINESS_ADDRESS }}"
        }
    }
    </script>
    {% endblock %}
</head>
<body class="bg-surface text-on-surface">
    <!-- Skip to Content (Accessibility) -->
    <a href="#main-content" class="skip-link bg-primary text-on-primary px-6 py-3 rounded-full font-bold shadow-lg focus:outline-none">Skip to main content</a>

    {% block body %}{% endblock %}

    <!-- Back to Top Button -->
    <button id="back-to-top" onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="Back to top" class="fixed bottom-8 left-8 z-40 w-12 h-12 bg-white/80 backdrop-blur-md text-on-surface rounded-full shadow-lg flex items-center justify-center hover:bg-white transition-all opacity-0 pointer-events-none" style="transition: opacity 0.3s;">
        <span class="material-symbols-outlined">keyboard_arrow_up</span>
    </button>

    <script>
        // Back to top visibility
        (function() {
            var btn = document.getElementById('back-to-top');
            if (!btn) return;
            window.addEventListener('scroll', function() {
                if (window.scrollY > 600) {
                    btn.style.opacity = '1';
                    btn.style.pointerEvents = 'auto';
                } else {
                    btn.style.opacity = '0';
                    btn.style.pointerEvents = 'none';
                }
            }, { passive: true });
        })();
    </script>

    {% block extra_js %}{% endblock %}
</body>
</html>
