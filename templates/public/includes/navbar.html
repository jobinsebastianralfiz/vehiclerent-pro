{% load vehicle_tags %}
<nav class="fixed top-0 w-full z-50 bg-stone-50/80 backdrop-blur-xl shadow-sm" role="navigation" aria-label="Main navigation">
    <div class="flex justify-between items-center px-8 py-6 max-w-screen-2xl mx-auto">
        <a href="{% url 'home' %}" class="flex items-center gap-3" aria-label="{{ BUSINESS_NAME }} - Home">
            {% if SITE_CONFIG.logo %}
            <img src="{{ SITE_CONFIG.logo.url }}" alt="{{ BUSINESS_NAME }}" class="h-8"/>
            {% endif %}
            <span class="text-2xl font-serif font-bold text-on-surface">{{ BUSINESS_NAME }}</span>
        </a>

        <!-- Desktop Nav -->
        <div class="hidden md:flex items-center space-x-12" role="menubar">
            <a class="font-serif text-on-surface hover:text-primary transition-colors tracking-tight" href="{% url 'home' %}" role="menuitem">Home</a>
            <a class="font-serif text-stone-500 hover:text-primary transition-colors tracking-tight" href="{% url 'vehicle_list' %}" role="menuitem">Fleet</a>
            <a class="font-serif text-stone-500 hover:text-primary transition-colors tracking-tight" href="{% url 'about' %}" role="menuitem">About</a>
            <a class="font-serif text-stone-500 hover:text-primary transition-colors tracking-tight" href="{% url 'contact' %}" role="menuitem">Contact</a>
        </div>

        <div class="flex items-center gap-4">
            <a href="{% url 'vehicle_list' %}" class="bg-primary text-on-primary px-8 py-3 rounded-full font-medium transition-transform active:scale-95 hidden md:inline-block">Browse Fleet</a>
            <button x-data x-on:click="$dispatch('toggle-mobile-menu')" class="md:hidden" aria-label="Open menu" aria-expanded="false" aria-controls="mobile-menu">
                <span class="material-symbols-outlined text-2xl" aria-hidden="true">menu</span>
            </button>
        </div>
    </div>

    <!-- Mobile menu -->
    <div id="mobile-menu" x-data="{ open: false }" x-on:toggle-mobile-menu.window="open = !open; $el.previousElementSibling?.querySelector('button')?.setAttribute('aria-expanded', open)" x-show="open" x-transition class="md:hidden bg-white border-t px-8 py-6 space-y-4" role="menu">
        <a class="block font-serif text-on-surface py-2" href="{% url 'home' %}" role="menuitem">Home</a>
        <a class="block font-serif text-stone-500 py-2" href="{% url 'vehicle_list' %}" role="menuitem">Fleet</a>
        <a class="block font-serif text-stone-500 py-2" href="{% url 'about' %}" role="menuitem">About</a>
        <a class="block font-serif text-stone-500 py-2" href="{% url 'contact' %}" role="menuitem">Contact</a>
        <a class="block font-serif text-stone-500 py-2" href="{% url 'faq' %}" role="menuitem">FAQ</a>
        <hr class="border-stone-200" role="separator"/>
        <a class="block font-serif text-stone-500 text-sm py-2" href="{% url 'terms' %}" role="menuitem">Terms</a>
        <a class="block font-serif text-stone-500 text-sm py-2" href="{% url 'privacy' %}" role="menuitem">Privacy</a>
        <a href="{% url 'vehicle_list' %}" class="block bg-primary text-on-primary px-6 py-3 rounded-full font-medium text-center mt-4" role="menuitem">Browse Fleet</a>
    </div>
</nav>
