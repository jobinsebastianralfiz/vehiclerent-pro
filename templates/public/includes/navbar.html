{% load vehicle_tags %}
<nav x-data="{ scrolled: false }" x-on:scroll.window="scrolled = (window.scrollY > 50)" class="fixed top-0 w-full z-50 transition-all duration-300" x-bind:class="scrolled ? 'bg-stone-50/95 backdrop-blur-xl shadow-sm' : 'bg-transparent'" role="navigation" aria-label="Main navigation">
    <div class="flex justify-between items-center px-4 sm:px-8 py-4 sm:py-5 max-w-screen-2xl mx-auto">
        <a href="{% url 'home' %}" class="flex items-center gap-2 sm:gap-3 min-w-0" aria-label="{{ BUSINESS_NAME }} - Home">
            {% if SITE_CONFIG.logo %}
            <img src="{{ SITE_CONFIG.logo.url }}" alt="{{ BUSINESS_NAME }}" class="h-10 sm:h-12 flex-shrink-0"/>
            {% endif %}
            {% if SITE_CONFIG.show_brand_name or not SITE_CONFIG.logo %}
            <span class="text-lg sm:text-2xl font-serif font-bold truncate transition-colors duration-300" x-bind:class="scrolled ? 'text-on-surface' : 'text-white'">{{ BUSINESS_NAME }}</span>
            {% endif %}
        </a>

        <!-- Desktop Nav -->
        <div class="hidden lg:flex items-center space-x-10" role="menubar">
            <a class="font-serif transition-colors tracking-tight" x-bind:class="scrolled ? 'text-on-surface hover:text-primary' : 'text-white/90 hover:text-white'" href="{% url 'home' %}" role="menuitem">Home</a>
            <a class="font-serif transition-colors tracking-tight" x-bind:class="scrolled ? 'text-stone-500 hover:text-primary' : 'text-white/70 hover:text-white'" href="{% url 'vehicle_list' %}" role="menuitem">Fleet</a>
            <a class="font-serif transition-colors tracking-tight" x-bind:class="scrolled ? 'text-stone-500 hover:text-primary' : 'text-white/70 hover:text-white'" href="{% url 'about' %}" role="menuitem">About</a>
            <a class="font-serif transition-colors tracking-tight" x-bind:class="scrolled ? 'text-stone-500 hover:text-primary' : 'text-white/70 hover:text-white'" href="{% url 'contact' %}" role="menuitem">Contact</a>
        </div>

        <div class="flex items-center gap-3">
            <a href="{% url 'vehicle_list' %}" class="px-6 py-2.5 rounded-full font-medium text-sm transition-all active:scale-95 hidden lg:inline-block" x-bind:class="scrolled ? 'bg-primary text-on-primary' : 'bg-white/15 text-white border border-white/25 backdrop-blur-md hover:bg-white/25'">Browse Fleet</a>
            <button x-on:click="$dispatch('toggle-mobile-menu')" class="lg:hidden p-1" aria-label="Open menu" aria-expanded="false" aria-controls="mobile-menu">
                <span class="material-symbols-outlined text-2xl transition-colors duration-300" x-bind:class="scrolled ? 'text-on-surface' : 'text-white'" aria-hidden="true">menu</span>
            </button>
        </div>
    </div>

    <!-- Mobile menu -->
    <div id="mobile-menu" x-data="{ open: false }" x-on:toggle-mobile-menu.window="open = !open" x-show="open" x-transition class="lg:hidden bg-white border-t px-4 sm:px-8 py-4 space-y-1" role="menu">
        <a class="block font-serif text-on-surface py-3 px-3 rounded-lg hover:bg-stone-50" href="{% url 'home' %}" role="menuitem">Home</a>
        <a class="block font-serif text-stone-500 py-3 px-3 rounded-lg hover:bg-stone-50" href="{% url 'vehicle_list' %}" role="menuitem">Fleet</a>
        <a class="block font-serif text-stone-500 py-3 px-3 rounded-lg hover:bg-stone-50" href="{% url 'about' %}" role="menuitem">About</a>
        <a class="block font-serif text-stone-500 py-3 px-3 rounded-lg hover:bg-stone-50" href="{% url 'contact' %}" role="menuitem">Contact</a>
        <a class="block font-serif text-stone-500 py-3 px-3 rounded-lg hover:bg-stone-50" href="{% url 'faq' %}" role="menuitem">FAQ</a>
        <hr class="border-stone-100 my-2" role="separator"/>
        <div class="flex gap-4 px-3 py-2">
            <a class="text-stone-400 text-xs hover:text-primary" href="{% url 'terms' %}">Terms</a>
            <a class="text-stone-400 text-xs hover:text-primary" href="{% url 'privacy' %}">Privacy</a>
        </div>
        <a href="{% url 'vehicle_list' %}" class="block bg-primary text-on-primary px-6 py-3 rounded-full font-medium text-center text-sm mt-2" role="menuitem">Browse Fleet</a>
    </div>
</nav>
