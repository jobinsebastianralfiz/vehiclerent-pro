<!-- Cookie Consent Banner -->
<div id="cookie-banner" x-data="{ show: !localStorage.getItem('cookie-consent') }" x-show="show" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="translate-y-full opacity-0" x-transition:enter-end="translate-y-0 opacity-100" x-transition:leave="transition ease-in duration-200" x-transition:leave-start="translate-y-0 opacity-100" x-transition:leave-end="translate-y-full opacity-0" class="fixed bottom-0 left-0 right-0 z-[60] p-4 md:p-0" x-cloak role="dialog" aria-label="Cookie consent">
    <div class="max-w-4xl mx-auto md:mb-8">
        <div class="bg-white rounded-2xl shadow-2xl border border-outline-variant/10 p-6 md:p-8 flex flex-col md:flex-row items-start md:items-center gap-4">
            <div class="flex-1">
                <p class="text-sm text-on-surface leading-relaxed">
                    We use essential cookies to ensure our website functions properly. We do not use tracking or advertising cookies.
                    <a href="{% url 'privacy' %}" class="text-primary font-medium hover:underline underline-offset-2">Privacy Policy</a>
                </p>
            </div>
            <div class="flex gap-3 flex-shrink-0">
                <button x-on:click="localStorage.setItem('cookie-consent','accepted'); show = false" class="bg-primary text-on-primary px-6 py-2.5 rounded-full text-sm font-medium hover:bg-primary-container transition-colors">Accept</button>
            </div>
        </div>
    </div>
</div>
