{% load vehicle_tags %}
<div x-data="chatbotWidget()" class="no-print">
    <!-- ─── Floating Trigger Button ─── -->
    <button
        type="button"
        x-on:click="openChat()"
        x-show="!open"
        x-transition:enter="transition ease-out duration-200"
        x-transition:enter-start="opacity-0 scale-90"
        x-transition:enter-end="opacity-100 scale-100"
        class="fixed bottom-6 right-6 sm:bottom-8 sm:right-8 bg-primary-fixed-dim text-on-surface p-4 sm:p-5 rounded-full shadow-2xl z-50 flex items-center justify-center hover:scale-105 transition-transform border-2 border-primary-container/30"
        aria-label="Open chat assistant"
    >
        <span class="material-symbols-outlined text-2xl sm:text-3xl" style="font-variation-settings: 'FILL' 1;">smart_toy</span>
        <span x-show="!hasOpened" class="absolute -top-1 -right-1 w-5 h-5 bg-error text-white text-[10px] font-bold rounded-full flex items-center justify-center animate-pulse">1</span>
    </button>

    <!-- ─── Chat Window ─── -->
    <div
        x-show="open"
        x-cloak
        x-transition:enter="transition ease-out duration-300"
        x-transition:enter-start="opacity-0 translate-y-6 scale-95"
        x-transition:enter-end="opacity-100 translate-y-0 scale-100"
        x-transition:leave="transition ease-in duration-200"
        x-transition:leave-start="opacity-100 translate-y-0 scale-100"
        x-transition:leave-end="opacity-0 translate-y-6 scale-95"
        class="fixed bottom-4 right-4 sm:bottom-8 sm:right-8 z-50 w-[calc(100vw-2rem)] sm:w-[400px] max-w-[400px] h-[calc(100vh-7rem)] sm:h-[600px] max-h-[600px] bg-surface-container-lowest rounded-3xl shadow-2xl overflow-hidden border border-outline-variant/30 flex flex-col"
        role="dialog"
        aria-label="Car search assistant"
    >
        <!-- Header -->
        <div class="bg-gradient-to-r from-primary-container to-secondary px-5 py-4 flex items-center gap-3 flex-shrink-0">
            <div class="w-11 h-11 bg-surface-container-lowest rounded-full flex items-center justify-center flex-shrink-0">
                <span class="material-symbols-outlined text-primary-container" style="font-variation-settings: 'FILL' 1;">smart_toy</span>
            </div>
            <div class="flex-1 min-w-0">
                <p class="font-bold text-on-primary text-base truncate">{{ BUSINESS_NAME }} Assistant</p>
                <p class="text-on-primary/80 text-xs flex items-center gap-1.5">
                    <span class="w-1.5 h-1.5 rounded-full bg-emerald-300 animate-pulse"></span>
                    Online · Ask me about cars
                </p>
            </div>
            <button type="button" x-on:click="open = false" class="text-on-primary/80 hover:text-on-primary p-1 rounded-full hover:bg-white/10 transition-colors" aria-label="Close chat">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>

        <!-- Message thread -->
        <div x-ref="thread" class="flex-1 bg-surface-container-low p-4 overflow-y-auto space-y-3">
            <template x-for="(msg, i) in messages" :key="i">
                <div :class="msg.role === 'user' ? 'flex justify-end' : 'flex items-start gap-2'">
                    <!-- Bot avatar -->
                    <div x-show="msg.role === 'bot'" class="w-8 h-8 bg-primary-container rounded-full flex items-center justify-center flex-shrink-0 mt-1">
                        <span class="material-symbols-outlined text-on-primary text-base" style="font-variation-settings: 'FILL' 1;">smart_toy</span>
                    </div>
                    <!-- Message bubble -->
                    <div :class="msg.role === 'user' ? 'bg-primary-container text-on-primary rounded-2xl rounded-br-sm px-4 py-2.5 max-w-[80%]' : 'flex-1 max-w-[85%] space-y-2'">
                        <!-- Text bubble -->
                        <div :class="msg.role === 'bot' ? 'bg-surface-container-lowest rounded-2xl rounded-tl-sm px-4 py-3 shadow-sm' : ''">
                            <p class="text-sm leading-relaxed whitespace-pre-line" x-text="msg.text"></p>
                        </div>
                        <!-- Vehicle cards -->
                        <template x-if="msg.vehicles && msg.vehicles.length">
                            <div class="space-y-2">
                                <template x-for="v in msg.vehicles" :key="v.id">
                                    <a :href="v.url" class="flex gap-3 bg-surface-container-lowest rounded-2xl p-3 hover:shadow-md transition-shadow">
                                        <div class="w-20 h-16 rounded-xl bg-surface-container-high overflow-hidden flex-shrink-0">
                                            <template x-if="v.thumbnail"><img :src="v.thumbnail" :alt="v.name" class="w-full h-full object-cover grayscale"/></template>
                                            <template x-if="!v.thumbnail"><div class="w-full h-full flex items-center justify-center"><span class="material-symbols-outlined text-outline-variant">directions_car</span></div></template>
                                        </div>
                                        <div class="flex-1 min-w-0">
                                            <p class="text-[10px] uppercase tracking-widest text-outline truncate" x-text="v.brand"></p>
                                            <p class="font-bold text-sm text-on-surface truncate" x-text="v.name"></p>
                                            <div class="flex items-center justify-between mt-1 gap-2">
                                                <p class="text-xs text-on-surface-variant truncate"><span x-text="v.transmission"></span> · <span x-text="v.fuel"></span><template x-if="v.seats"> · <span x-text="v.seats"></span> seats</template></p>
                                                <p class="text-sm font-bold text-primary-container whitespace-nowrap">₹<span x-text="v.price"></span></p>
                                            </div>
                                        </div>
                                    </a>
                                </template>
                            </div>
                        </template>
                    </div>
                </div>
            </template>

            <!-- Typing indicator -->
            <div x-show="loading" class="flex items-start gap-2">
                <div class="w-8 h-8 bg-primary-container rounded-full flex items-center justify-center flex-shrink-0 mt-1">
                    <span class="material-symbols-outlined text-on-primary text-base" style="font-variation-settings: 'FILL' 1;">smart_toy</span>
                </div>
                <div class="bg-surface-container-lowest rounded-2xl rounded-tl-sm px-4 py-3 shadow-sm flex items-center gap-1.5">
                    <span class="w-2 h-2 bg-outline rounded-full animate-bounce" style="animation-delay: 0s"></span>
                    <span class="w-2 h-2 bg-outline rounded-full animate-bounce" style="animation-delay: 0.15s"></span>
                    <span class="w-2 h-2 bg-outline rounded-full animate-bounce" style="animation-delay: 0.3s"></span>
                </div>
            </div>
        </div>

        <!-- Quick suggestions (only visible when thread has 1 bot message) -->
        <div x-show="messages.length === 1" class="px-4 pb-2 bg-surface-container-low flex flex-wrap gap-2 flex-shrink-0">
            <template x-for="s in suggestions" :key="s">
                <button x-on:click="sendMessage(s)" class="bg-surface-container-lowest border border-outline-variant/30 px-3 py-1.5 rounded-full text-xs font-medium text-on-surface-variant hover:bg-surface-container-high transition-colors" x-text="s"></button>
            </template>
        </div>

        <!-- Input bar -->
        <div class="border-t border-outline-variant/30 p-3 flex items-center gap-2 bg-surface-container-lowest flex-shrink-0">
            <input
                type="text"
                x-model="input"
                x-on:keydown.enter.prevent="sendMessage(input)"
                placeholder="Ask about cars, dates, prices..."
                class="flex-1 bg-surface-container-low border-none rounded-full px-4 py-2.5 text-sm focus:ring-1 focus:ring-primary-container"
            >
            <button x-on:click="sendMessage(input)" :disabled="!input.trim() || loading" class="bg-primary-container text-on-primary p-2.5 rounded-full hover:opacity-90 disabled:opacity-50 transition-all flex-shrink-0" aria-label="Send">
                <span class="material-symbols-outlined">send</span>
            </button>
        </div>

        <!-- WhatsApp fallback -->
        {% if WHATSAPP_NUMBER %}
        <a href="{% whatsapp_url %}" target="_blank" rel="noopener" class="block bg-[#25D366] text-white px-4 py-3 text-center text-sm font-bold flex items-center justify-center gap-2 hover:opacity-90 transition-opacity flex-shrink-0">
            <svg fill="currentColor" height="18" viewBox="0 0 24 24" width="18" aria-hidden="true"><path d="M17.6 6.32A7.85 7.85 0 0 0 12.05 4a7.94 7.94 0 0 0-6.88 11.91L4 20l4.2-1.1a7.93 7.93 0 0 0 3.79.97h.01a7.95 7.95 0 0 0 5.6-13.55zm-5.55 12.22a6.6 6.6 0 0 1-3.36-.92l-.24-.14-2.5.65.67-2.43-.16-.25a6.59 6.59 0 1 1 12.24-3.5 6.58 6.58 0 0 1-6.65 6.59zm3.62-4.93c-.2-.1-1.18-.58-1.36-.65-.18-.07-.32-.1-.45.1-.13.2-.51.65-.63.78-.12.13-.23.15-.43.05-.2-.1-.84-.31-1.6-.99-.59-.53-.99-1.18-1.1-1.38-.12-.2-.01-.31.09-.41.09-.09.2-.23.3-.35.1-.12.13-.2.2-.33.06-.13.03-.25-.02-.35-.05-.1-.45-1.08-.62-1.48-.16-.39-.32-.34-.45-.34-.12 0-.25-.02-.39-.02-.13 0-.35.05-.53.25-.18.2-.7.68-.7 1.66 0 .98.72 1.93.82 2.06.1.13 1.41 2.16 3.42 3.03.48.21.85.33 1.14.42.48.15.92.13 1.26.08.39-.06 1.18-.48 1.34-.95.17-.47.17-.86.12-.95-.05-.08-.18-.13-.39-.23z"/></svg>
            Continue on WhatsApp
        </a>
        {% endif %}
    </div>
</div>

<script>
function chatbotWidget() {
    return {
        open: false,
        hasOpened: false,
        input: '',
        loading: false,
        messages: [
            { role: 'bot', text: "👋 Hi! I'm your car-finding assistant. Tell me what you need — I'll search our fleet instantly." }
        ],
        suggestions: [
            "Automatic SUV under 3000",
            "Wedding car in Kochi",
            "7 seater for outstation",
            "Premium car with driver",
            "Manual hatchback"
        ],
        openChat() {
            this.open = true;
            this.hasOpened = true;
        },
        getCsrf() {
            const m = document.cookie.match(/csrftoken=([^;]+)/);
            return m ? m[1] : '';
        },
        scrollToBottom() {
            this.$nextTick(() => {
                const t = this.$refs.thread;
                if (t) t.scrollTop = t.scrollHeight;
            });
        },
        async sendMessage(text) {
            const msg = (text || '').trim();
            if (!msg || this.loading) return;
            this.messages.push({ role: 'user', text: msg });
            this.input = '';
            this.loading = true;
            this.scrollToBottom();
            try {
                const res = await fetch("{% url 'chat_search' %}", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-CSRFToken': this.getCsrf() },
                    body: JSON.stringify({ message: msg })
                });
                const data = await res.json();
                this.messages.push({ role: 'bot', text: data.reply, vehicles: data.vehicles || [] });
            } catch (e) {
                this.messages.push({ role: 'bot', text: "Sorry, I'm having trouble right now. Please message us on WhatsApp." });
            } finally {
                this.loading = false;
                this.scrollToBottom();
            }
        }
    }
}
</script>
