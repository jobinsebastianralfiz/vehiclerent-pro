[build]
builder = "nixpacks"

[deploy]
startCommand = "mkdir -p $RAILWAY_VOLUME_MOUNT_PATH/media && python manage.py migrate --noinput && python manage.py collectstatic --noinput && python manage.py init_production && gunicorn config.wsgi --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
healthcheckPath = "/manage/login/"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 5
